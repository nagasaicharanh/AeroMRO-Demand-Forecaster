name: Build & Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pandas numpy scikit-learn
      - name: Run tests
        run: pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t aero-forecaster .
